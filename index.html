<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3350;
      --accent:    #6366f1;
      --accent2:   #818cf8;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .brand { display: flex; align-items: center; gap: .75rem; }
    .brand-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .brand-text h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.02em; }
    .brand-text p  { font-size: .8rem; color: var(--muted); margin-top: 1px; }

    .search-wrap {
      position: relative;
      flex: 0 1 280px;
    }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%; padding: .55rem 1rem .55rem 2.4rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .9rem;
      outline: none; transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    .section-label {
      font-size: .7rem; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: .6rem;
      transition: border-color .2s, transform .15s, box-shadow .2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--card-color, var(--accent)) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .2s;
    }
    .card:hover { border-color: var(--card-color, var(--accent)); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.35); }
    .card:hover::before { opacity: .07; }

    .card-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      position: relative;
      overflow: hidden;
    }
    .card-icon img { width: 26px; height: 26px; object-fit: contain; }
    .card-icon .emoji { line-height: 1; }

    .card-name { font-size: .95rem; font-weight: 600; }
    .card-desc { font-size: .78rem; color: var(--muted); line-height: 1.4; }
    .card-url  { font-size: .7rem; color: var(--muted); opacity: .6; margin-top: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .add-card {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      cursor: pointer;
      color: var(--muted);
      font-size: .85rem;
      transition: border-color .2s, color .2s;
      min-height: 120px;
    }
    .add-card:hover { border-color: var(--accent); color: var(--accent2); }
    .add-card svg { width: 22px; height: 22px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      width: min(440px, 92vw);
      transform: translateY(12px);
      transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 1.1rem; margin-bottom: 1.4rem; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .35rem; }
    .field input, .field select {
      width: 100%; padding: .55rem .8rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .9rem; outline: none;
      transition: border-color .2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }

    .emoji-grid {
      display: flex; flex-wrap: wrap; gap: .4rem;
      margin-top: .4rem;
    }
    .emoji-opt {
      width: 34px; height: 34px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s;
    }
    .emoji-opt.selected, .emoji-opt:hover { border-color: var(--accent); }

    .colors { display: flex; gap: .5rem; margin-top: .4rem; flex-wrap: wrap; }
    .color-opt {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: border-color .15s;
    }
    .color-opt.selected { border-color: white; }

    .modal-actions { display: flex; gap: .75rem; margin-top: 1.5rem; justify-content: flex-end; }
    .btn {
      padding: .55rem 1.2rem; border-radius: 8px; font-size: .9rem;
      font-weight: 600; cursor: pointer; border: none; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-ghost { background: var(--surface2); color: var(--text); }

    .hidden { display: none !important; }

    @media (max-width: 500px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🏠</div>
    <div class="brand-text">
      <h1>Panel de Control</h1>
      <p>Clínica de Rodillas · Dr. Cristobal Alonso</p>
    </div>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Buscar..." />
  </div>
</header>

<p class="section-label">Mis aplicaciones</p>
<div class="grid" id="grid"></div>

<!-- Modal agregar -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Agregar acceso directo</h2>
    <div class="field">
      <label>Nombre</label>
      <input id="m-name" type="text" placeholder="Nombre de la app" />
    </div>
    <div class="field">
      <label>URL</label>
      <input id="m-url" type="url" placeholder="https://..." />
    </div>
    <div class="field">
      <label>Descripción (opcional)</label>
      <input id="m-desc" type="text" placeholder="Breve descripción" />
    </div>
    <div class="field">
      <label>Icono</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="field">
      <label>Color</label>
      <div class="colors" id="color-grid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCard()">Agregar</button>
    </div>
  </div>
</div>

<script>
  const EMOJIS = ['🚂','🏥','💊','📱','📊','💬','🔧','📧','🌐','🔒','📋','⚙️','🗂️','📡','🤖','💻','🏠','📅','💡','🔍'];
  const COLORS  = ['#6366f1','#a855f7','#ec4899','#f97316','#eab308','#22c55e','#14b8a6','#06b6d4','#3b82f6','#64748b'];

  const DEFAULTS = [
    { name: 'Railway',        url: 'https://railway.com/dashboard',                         desc: 'Infraestructura y deploys',          icon: '🚂', color: '#7c3aed' },
    { name: 'OrthoClinic',   url: 'https://portal.clinicaderodillas.net/',                  desc: 'Sistema de consultas ortopédicas',   icon: '🏥', color: '#6366f1' },
    { name: 'MedRemind',     url: 'https://medremind-production.up.railway.app/',           desc: 'Recordatorios médicos',              icon: '💊', color: '#22c55e' },
    { name: 'Dashboard',     url: 'https://dashboard-production-00a7.up.railway.app/',      desc: 'Censo hospitalario',                 icon: '📊', color: '#f97316' },
    { name: 'WhatsSender',   url: 'https://whatssender-production.up.railway.app/',         desc: 'Envío masivo de WhatsApp',           icon: '💬', color: '#25d366' },
    { name: 'Twilio',        url: 'https://www.twilio.com/login',                           desc: 'Mensajería y comunicaciones',        icon: '📡', color: '#f22f46' },
  ];

  let cards = [];
  let selected = { emoji: EMOJIS[0], color: COLORS[0] };

  function load() {
    try { cards = JSON.parse(localStorage.getItem('home-cards') || 'null') || DEFAULTS; }
    catch { cards = DEFAULTS; }
    render();
  }

  function save() { localStorage.setItem('home-cards', JSON.stringify(cards)); }

  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    cards
      .filter(c => !q || c.name.toLowerCase().includes(q) || (c.desc||'').toLowerCase().includes(q))
      .forEach((c, i) => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = c.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.style.setProperty('--card-color', c.color || COLORS[0]);
        a.innerHTML = `
          <div class="card-icon" style="background:${hexAlpha(c.color||COLORS[0], .15)}">
            <span class="emoji">${c.icon}</span>
          </div>
          <div class="card-name">${esc(c.name)}</div>
          ${c.desc ? `<div class="card-desc">${esc(c.desc)}</div>` : ''}
          <div class="card-url">${esc(c.url)}</div>
        `;
        grid.appendChild(a);
      });

    // Add button
    if (!q) {
      const btn = document.createElement('div');
      btn.className = 'add-card';
      btn.onclick = openModal;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span>Agregar app</span>`;
      grid.appendChild(btn);
    }
  }

  function hexAlpha(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function openModal() {
    selected = { emoji: EMOJIS[0], color: COLORS[0] };
    document.getElementById('m-name').value = '';
    document.getElementById('m-url').value = '';
    document.getElementById('m-desc').value = '';
    buildEmojiGrid();
    buildColorGrid();
    document.getElementById('modal').classList.add('open');
    document.getElementById('m-name').focus();
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  function buildEmojiGrid() {
    const el = document.getElementById('emoji-grid');
    el.innerHTML = EMOJIS.map(e => `<div class="emoji-opt ${e===selected.emoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');
  }
  function buildColorGrid() {
    const el = document.getElementById('color-grid');
    el.innerHTML = COLORS.map(c => `<div class="color-opt ${c===selected.color?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
  }
  function selectEmoji(e) { selected.emoji = e; buildEmojiGrid(); }
  function selectColor(c) { selected.color = c; buildColorGrid(); }

  function saveCard() {
    const name = document.getElementById('m-name').value.trim();
    const url  = document.getElementById('m-url').value.trim();
    if (!name || !url) return;
    cards.push({ name, url, desc: document.getElementById('m-desc').value.trim(), icon: selected.emoji, color: selected.color });
    save();
    closeModal();
    render();
  }

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  load();
</script>
</body>
</html>
